    <title>Panel CMS — Znajdź swoje miejsce</title>

  <body>
    <!--
      Sveltia CMS sama renderuje cały interfejs panelu.
      Skrypt wczytuje konfigurację z config.yml (w tym samym folderze)
      i pokazuje panel po lewej (kolekcje: Strona główna, Kroki, Miejsca).

      Logowanie odbywa się przez GitHub OAuth — po wejściu na ten adres
      pojawi się ekran logowania Sveltii z przyciskiem „Login with GitHub".
      Konfiguracja OAuth Application znajduje się w panelu Netlify
      (Site configuration → Access & security → OAuth → GitHub).
    -->
    <script src="https://unpkg.com/@sveltia/cms/dist/sveltia-cms.js"></script>
